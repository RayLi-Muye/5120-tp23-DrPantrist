version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: useitup-postgres
    environment:
      POSTGRES_DB: UseItUpDB
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin1
    volumes:
      - pgdata:/var/lib/postgresql/data
    # 仅绑定到本机，外网不能直连数据库（安全）
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d UseItUpDB"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    networks: [appnet]

  api:
    build: .
    container_name: useitup-api
    environment:
      # 容器间用服务名 postgres 作为主机名
      DATABASE_URL: postgresql+asyncpg://admin:admin1@postgres:5432/UseItUpDB
      # 需要的话在这里再加 CORS_ORIGINS / APP_ENV 等
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8000:8000"     # 前端访问的端口；以后如加 Nginx 可改为仅内部暴露
    restart: unless-stopped
    networks: [appnet]

volumes:
  pgdata:
    external: true      # 复用你现有的数据卷

networks:
  appnet:
    driver: bridge
